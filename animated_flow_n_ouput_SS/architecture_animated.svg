<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">

<!-- ══════ BACKGROUND ══════ -->
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#080c14"/>
    <stop offset="40%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#111a25"/>
  </linearGradient>
  <linearGradient id="g-boto" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1d4ed8"/>
  </linearGradient>
  <linearGradient id="g-ec2" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ff9900"/><stop offset="100%" stop-color="#e68a00"/>
  </linearGradient>
  <linearGradient id="g-ebs" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/>
  </linearGradient>
  <linearGradient id="g-snap" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/>
  </linearGradient>
  <linearGradient id="g-boom" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#b91c1c"/>
  </linearGradient>
  <linearGradient id="g-scan" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/>
  </linearGradient>
  <linearGradient id="g-ami" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#be185d"/>
  </linearGradient>
  <linearGradient id="g-clean" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#ea580c"/>
  </linearGradient>
  <linearGradient id="g-money" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#047857"/>
  </linearGradient>
  <linearGradient id="g-user" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#6e7681"/><stop offset="100%" stop-color="#484f58"/>
  </linearGradient>
  <linearGradient id="g-warn" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/>
  </linearGradient>
  <!-- Glow filter for packets -->
  <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Soft shadow for nodes -->
  <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity=".5"/></filter>
  <!-- Glow ring pulse -->
  <filter id="glowRing"><feGaussianBlur in="SourceGraphic" stdDeviation="3"/></filter>
</defs>

<rect width="1400" height="900" fill="url(#bg)"/>

<!-- ══════ TITLE ══════ -->
<text x="700" y="42" text-anchor="middle" font-family="Segoe UI,system-ui,sans-serif" font-size="30" font-weight="700" fill="#58a6ff">AWS Cloud Optimization Project — Architecture</text>
<text x="700" y="68" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" fill="#8b949e">Live animated flow · boto3 creates EC2 → deletes it → detects idle snapshots → cleans up to save $$$</text>

<!-- ══════ AWS CLOUD BOUNDARY ══════ -->
<rect x="195" y="85" width="1140" height="730" rx="20" fill="none" stroke="#1c2333" stroke-width="2" stroke-dasharray="8,6"/>
<rect x="210" y="75" width="310" height="22" rx="4" fill="#0d1117"/>
<text x="220" y="91" font-family="Segoe UI,sans-serif" font-size="13" fill="#58a6ff" font-weight="600">☁ AWS Cloud — eu-central-1 (Frankfurt)</text>

<!-- ══════ ROW POSITIONS ══════ -->
<!-- Row 1 (Create): cy=200, Row 2 (Delete): cy=460, Row 3 (Optimize): cy=700 -->

<!-- ══════ STAGE BADGES ══════ -->
<rect x="240" y="108" width="210" height="32" rx="16" fill="#ff990020" stroke="#ff990058" stroke-width="1.5"/>
<text x="345" y="130" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="800" fill="#ff9900" letter-spacing="1.5">STAGE 1 — CREATE</text>

<rect x="240" y="365" width="210" height="32" rx="16" fill="#ff444420" stroke="#ff444458" stroke-width="1.5"/>
<text x="345" y="387" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="800" fill="#ff4444" letter-spacing="1.5">STAGE 2 — DELETE</text>

<rect x="240" y="608" width="230" height="32" rx="16" fill="#58a6ff20" stroke="#58a6ff58" stroke-width="1.5"/>
<text x="355" y="630" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="800" fill="#58a6ff" letter-spacing="1.5">STAGE 3 — OPTIMIZE</text>

<!-- ══════════════════════════════════════════════ -->
<!-- NODE TEMPLATE: rounded rect + emoji + label   -->
<!-- ══════════════════════════════════════════════ -->

<!-- ══════ STAGE 1 NODES ══════ -->
<!-- You -->
<g filter="url(#shadow)"><rect x="40" y="165" width="90" height="90" rx="20" fill="url(#g-user)"/></g>
<text x="85" y="220" text-anchor="middle" font-size="42">🧑‍💻</text>
<text x="85" y="280" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">You</text>
<text x="85" y="298" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#8b949e">Run stage1_demo.py</text>

<!-- boto3 -->
<g filter="url(#shadow)"><rect x="230" y="165" width="90" height="90" rx="20" fill="url(#g-boto)"/></g>
<rect x="224" y="159" width="102" height="102" rx="24" fill="none" stroke="#58a6ff" stroke-width="2" opacity=".5">
  <animate attributeName="opacity" values=".5;.2;.5" dur="2s" repeatCount="indefinite"/>
</rect>
<text x="275" y="220" text-anchor="middle" font-size="42">🐍</text>
<text x="275" y="280" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">boto3</text>
<text x="275" y="298" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#8b949e">Python AWS SDK</text>

<!-- EC2 Instance -->
<g filter="url(#shadow)"><rect x="450" y="165" width="90" height="90" rx="20" fill="url(#g-ec2)"/></g>
<text x="495" y="220" text-anchor="middle" font-size="42">🖥️</text>
<text x="495" y="280" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">EC2 Instance</text>
<text x="495" y="298" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#8b949e">t2.micro server</text>

<!-- EBS Volume -->
<g filter="url(#shadow)"><rect x="700" y="165" width="90" height="90" rx="20" fill="url(#g-ebs)"/></g>
<text x="745" y="220" text-anchor="middle" font-size="42">💾</text>
<text x="745" y="280" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">EBS Volume</text>
<text x="745" y="298" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#8b949e">Root disk (8 GB)</text>

<!-- Snapshot -->
<g filter="url(#shadow)"><rect x="950" y="165" width="90" height="90" rx="20" fill="url(#g-snap)"/></g>
<text x="995" y="220" text-anchor="middle" font-size="42">📸</text>
<text x="995" y="280" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Snapshot</text>
<text x="995" y="298" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#8b949e">Backup of volume</text>

<!-- ══════ STAGE 2 NODES ══════ -->
<!-- boto3 (delete) -->
<g filter="url(#shadow)"><rect x="230" y="420" width="90" height="90" rx="20" fill="url(#g-boto)"/></g>
<text x="275" y="475" text-anchor="middle" font-size="42">🐍</text>
<text x="275" y="535" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">boto3</text>
<text x="275" y="553" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#8b949e">terminate_instances()</text>

<!-- EC2 Terminated -->
<g filter="url(#shadow)"><rect x="450" y="420" width="90" height="90" rx="20" fill="url(#g-boom)"/></g>
<text x="495" y="475" text-anchor="middle" font-size="42">💥</text>
<text x="495" y="535" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">EC2 Terminated</text>
<text x="495" y="553" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#8b949e">Instance gone</text>

<!-- Volume Deleted -->
<g filter="url(#shadow)"><rect x="700" y="420" width="90" height="90" rx="20" fill="url(#g-boom)"/></g>
<text x="745" y="475" text-anchor="middle" font-size="42">💥</text>
<text x="745" y="535" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Volume Deleted</text>
<text x="745" y="553" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#8b949e">Auto-deleted with EC2</text>

<!-- Snapshot ALIVE -->
<g filter="url(#shadow)"><rect x="950" y="420" width="90" height="90" rx="20" fill="url(#g-snap)"/></g>
<rect x="944" y="414" width="102" height="102" rx="24" fill="none" stroke="#a855f7" stroke-width="2" opacity=".5">
  <animate attributeName="opacity" values=".6;.15;.6" dur="1.8s" repeatCount="indefinite"/>
</rect>
<text x="995" y="475" text-anchor="middle" font-size="42">📸</text>
<text x="995" y="535" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Snapshot ALIVE</text>
<text x="995" y="553" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#ff9900">Still costs $$$!</text>

<!-- ══════ STAGE 3 NODES ══════ -->
<!-- boto3 (scan) -->
<g filter="url(#shadow)"><rect x="230" y="665" width="90" height="90" rx="20" fill="url(#g-scan)"/></g>
<text x="275" y="720" text-anchor="middle" font-size="42">🐍</text>
<text x="275" y="780" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">boto3</text>
<text x="275" y="798" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#8b949e">describe_snapshots()</text>

<!-- Cross-Check -->
<g filter="url(#shadow)"><rect x="450" y="665" width="90" height="90" rx="20" fill="url(#g-scan)"/></g>
<text x="495" y="720" text-anchor="middle" font-size="42">🔍</text>
<text x="495" y="780" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Cross-Check</text>
<text x="495" y="798" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#8b949e">Volume still exists?</text>

<!-- AMI Safety -->
<g filter="url(#shadow)"><rect x="700" y="665" width="90" height="90" rx="20" fill="url(#g-ami)"/></g>
<text x="745" y="720" text-anchor="middle" font-size="42">🛡️</text>
<text x="745" y="780" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">AMI Safety</text>
<text x="745" y="798" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#8b949e">Skip if AMI-backed</text>

<!-- Delete Snapshot -->
<g filter="url(#shadow)"><rect x="950" y="665" width="90" height="90" rx="20" fill="url(#g-clean)"/></g>
<text x="995" y="720" text-anchor="middle" font-size="42">🧹</text>
<text x="995" y="780" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Delete Snapshot</text>
<text x="995" y="798" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#8b949e">delete_snapshot()</text>

<!-- Cost Saved -->
<g filter="url(#shadow)"><rect x="1200" y="665" width="90" height="90" rx="20" fill="url(#g-money)"/></g>
<rect x="1194" y="659" width="102" height="102" rx="24" fill="none" stroke="#10b981" stroke-width="2" opacity=".5">
  <animate attributeName="opacity" values=".6;.15;.6" dur="2s" repeatCount="indefinite"/>
</rect>
<text x="1245" y="720" text-anchor="middle" font-size="42">💰</text>
<text x="1245" y="780" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Cost Saved!</text>
<text x="1245" y="798" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#10b981">$0.05/GB/month</text>

